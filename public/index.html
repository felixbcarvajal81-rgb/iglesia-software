<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iglesia - Iniciar Sesion</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="login-container">
    <div class="login-box">
      <div class="cross-icon">&#9769;</div>
      <h1>Church System</h1>
      <p class="subtitle">Sistema de Gestion de Iglesia</p>

      <div id="alert" class="alert alert-error" style="display:none;"></div>

      <div class="tabs">
        <button class="tab active" onclick="showTab('login')">Iniciar Sesion</button>
        <button class="tab" onclick="showTab('register')">Registrarse</button>
      </div>

      <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="loginEmail" required placeholder="tu@email.com">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="loginPassword" required placeholder="Tu password" minlength="6">
        </div>
        <button type="submit" class="btn btn-primary" id="loginBtn">Iniciar Sesion</button>
      </form>

      <form id="registerForm" style="display:none;" onsubmit="handleRegister(event)">
        <div class="form-group">
          <label>Nombre de usuario</label>
          <input type="text" id="regUsername" required placeholder="Tu usuario">
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="regEmail" required placeholder="tu@email.com">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="regPassword" required placeholder="Minimo 6 caracteres" minlength="6">
        </div>
        <div class="form-group">
          <label>Rol</label>
          <select id="regRole">
            <option value="member">Miembro</option>
            <option value="leader">Lider</option>
            <option value="admin">Administrador</option>
          </select>
        </div>
        <button type="submit" class="btn btn-primary" id="regBtn">Crear Cuenta</button>
      </form>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script>
    if (API.getToken()) {
      window.location.href = '/dashboard.html';
    }

    function showTab(tab) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      if (tab === 'login') {
        document.getElementById('loginForm').style.display = 'block';
        document.getElementById('registerForm').style.display = 'none';
        document.querySelectorAll('.tab')[0].classList.add('active');
      } else {
        document.getElementById('loginForm').style.display = 'none';
        document.getElementById('registerForm').style.display = 'block';
        document.querySelectorAll('.tab')[1].classList.add('active');
      }
      hideAlert();
    }

    function showAlert(msg) {
      const el = document.getElementById('alert');
      el.textContent = msg;
      el.style.display = 'block';
    }

    function hideAlert() {
      document.getElementById('alert').style.display = 'none';
    }

    async function handleLogin(e) {
      e.preventDefault();
      hideAlert();
      const btn = document.getElementById('loginBtn');
      btn.textContent = 'Ingresando...';
      btn.disabled = true;
      try {
        const email = document.getElementById('loginEmail').value;
        const password = document.getElementById('loginPassword').value;
        await Auth.login(email, password);
        window.location.href = '/dashboard.html';
      } catch (error) {
        showAlert(error.message);
      } finally {
        btn.textContent = 'Iniciar Sesion';
        btn.disabled = false;
      }
    }

    async function handleRegister(e) {
      e.preventDefault();
      hideAlert();
      const btn = document.getElementById('regBtn');
      btn.textContent = 'Creando...';
      btn.disabled = true;
      try {
        const username = document.getElementById('regUsername').value;
        const email = document.getElementById('regEmail').value;
        const password = document.getElementById('regPassword').value;
        const role = document.getElementById('regRole').value;
        await Auth.register(username, email, password, role);
        window.location.href = '/dashboard.html';
      } catch (error) {
        showAlert(error.message);
      } finally {
        btn.textContent = 'Crear Cuenta';
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
